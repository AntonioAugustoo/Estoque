services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: estoque_user
      POSTGRES_PASSWORD: estoque_password
      POSTGRES_DB: estoque_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estoque_user -d estoque_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://estoque_user:estoque_password@db:5432/estoque_db
    depends_on:
      db:
        condition: service_healthy

  tests:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://estoque_user:estoque_password@db:5432/estoque_db
    command: pytest tests/ -v
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data: