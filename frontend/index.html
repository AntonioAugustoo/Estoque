<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque — Dashboard</title>
  <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>

  <header>
    <span class="logo">estoque<span>/sys</span></span>
    <nav>
      <a href="index.html" class="active">dashboard</a>
      <a href="produtos.html">produtos</a>
      <a href="categorias.html">categorias</a>
    </nav>
  </header>

  <main class="dashboard">
    <div class="page-header">
      <p class="page-label">visão geral</p>
      <h1>Dashboard</h1>
    </div>

    <section class="cards">
      <div class="card">
        <div class="card-icon">📦</div>
        <div class="card-info">
          <span class="card-label">Produtos</span>
          <span class="card-value" id="total-produtos">—</span>
        </div>
      </div>
      <div class="card">
        <div class="card-icon">🏷️</div>
        <div class="card-info">
          <span class="card-label">Categorias</span>
          <span class="card-value" id="total-categorias">—</span>
        </div>
      </div>
      <div class="card">
        <div class="card-icon">🚚</div>
        <div class="card-info">
          <span class="card-label">Fornecedores</span>
          <span class="card-value" id="total-fornecedores">—</span>
        </div>
      </div>
    </section>

    <section class="tabela-section">
      <h2>Produtos Recentes</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Preço</th>
            <th>Quantidade</th>
          </tr>
        </thead>
        <tbody id="tabela-produtos"></tbody>
      </table>
    </section>
  </main>

  <footer>
    antonio augusto &mdash; matrícula 221 &mdash; inatel c216
  </footer>

  <script src="static/js/main.js"></script>
</body>
</html>
